<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Portfolio IT Support</title>

  <!-- FAVICON FIXED (VERSI PALING AMAN) -->
  <link rel="icon" type="image/png" sizes="32x32" href="./fotoku.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="./fotoku.png?v=1">
  <link rel="shortcut icon" href="./fotoku.png?v=1">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto">

  <!-- HEADER -->
  <div class="bg-white p-8 rounded-3xl shadow-lg mb-6">
    <h1 class="text-4xl font-bold">Muhammad Mukti Munasir Putra</h1>
    <p class="text-gray-600 mt-2">
      IT Support | ERP | POS | Network | SQL
    </p>

    <input id="search" type="text"
      placeholder="Cari project..."
      class="mt-5 w-full p-3 border rounded-xl">
  </div>

  <h2 class="text-2xl font-bold mb-4">Portfolio Projects</h2>

  <div id="projectList" class="grid md:grid-cols-2 gap-6"></div>

</div>

<!-- MODAL -->
<div id="modal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-6 z-40"
  onclick="handleOutsideClick(event)">

  <div class="bg-white w-full max-w-3xl rounded-2xl p-6 relative max-h-[90vh] overflow-y-auto">

    <button onclick="closeModal()" class="absolute right-4 top-2 text-3xl">×</button>

    <!-- IMAGE -->
    <div class="flex justify-center">
      <img id="modalImg"
        class="w-full h-72 object-cover rounded-xl cursor-pointer"
        onclick="openImage(this.src)">
    </div>

    <h2 id="modalTitle" class="text-2xl font-bold mt-4"></h2>
    <p id="modalDesc" class="text-gray-600 mt-2"></p>

    <!-- TANGGUNG JAWAB -->
    <h3 class="mt-5 font-bold text-blue-900">Tanggung Jawab</h3>
    <ul id="modalResponsibilities" class="list-disc pl-5 text-gray-700 mt-2 space-y-1"></ul>

    <!-- TOOLS -->
    <h3 class="mt-5 font-bold">Tools</h3>
    <div id="modalTools" class="flex flex-wrap gap-2 mt-2"></div>

    <!-- RESULT -->
    <div class="mt-5 bg-blue-600 text-white p-4 rounded-xl">
      <b>Hasil:</b> <span id="modalResult"></span>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="imageLightbox"
  class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50"
  onclick="closeImage()">

  <img id="lightboxImg"
    class="max-w-5xl max-h-[90vh] rounded-xl shadow-2xl">
</div>

<script>

const projects = [
  {
    title: "Dukungan IT & Troubleshooting ERP",
    image: "erp-support.png",
    description: "Remote support ERP, database & troubleshooting sistem bisnis.",
    responsibilities: [
      "Troubleshooting ERP & database",
      "Remote support AnyDesk / TeamViewer / RDC",
      "Konfigurasi printer & jaringan",
      "Optimasi SQL query"
    ],
    tools: ["SQL", "AnyDesk", "TeamViewer", "UltraViewer"],
    result: "5.665+ cases handled & 388+ clients supported"
  },
  {
    title: "POS System & Network Setup",
    image: "pos-system.png",
    description: "Setup POS restoran & jaringan retail.",
    responsibilities: [
      "Setup NCR Aloha POS",
      "Konfigurasi router & WiFi",
      "Troubleshooting jaringan",
      "Support onsite & remote"
    ],
    tools: ["NCR Aloha POS", "Windows", "Ubuntu Linux"],
    result: "Stabilitas sistem POS dengan downtime minimal"
  }
];

// render
function render(data) {
  const container = document.getElementById("projectList");
  container.innerHTML = "";

  data.forEach((p, i) => {
    container.innerHTML += `
      <div onclick="openModal(${i})"
        class="card bg-white rounded-2xl p-5 shadow">

        <h3 class="text-xl font-bold">${p.title}</h3>
        <p class="text-gray-600 mt-2">${p.description}</p>

        <div class="flex flex-wrap gap-2 mt-3">
          ${p.tools.map(t => `
            <span class="bg-blue-100 text-blue-700 px-2 py-1 text-xs rounded-full">
              ${t}
            </span>
          `).join("")}
        </div>

      </div>
    `;
  });
}

// search
document.getElementById("search").addEventListener("input", function(e) {
  const value = e.target.value.toLowerCase();
  const filtered = projects.filter(p =>
    p.title.toLowerCase().includes(value) ||
    p.description.toLowerCase().includes(value)
  );
  render(filtered);
});

// modal open
function openModal(index) {
  const p = projects[index];

  document.getElementById("modalImg").src = p.image;
  document.getElementById("modalTitle").innerText = p.title;
  document.getElementById("modalDesc").innerText = p.description;
  document.getElementById("modalResult").innerText = p.result;

  document.getElementById("modalResponsibilities").innerHTML =
    p.responsibilities.map(r => `<li>${r}</li>`).join("");

  document.getElementById("modalTools").innerHTML =
    p.tools.map(t => `
      <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">
        ${t}
      </span>
    `).join("");

  document.getElementById("modal").classList.remove("hidden");
}

// close modal
function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

// click outside to close
function handleOutsideClick(event) {
  if (event.target.id === "modal") {
    closeModal();
  }
}

// lightbox
function openImage(src) {
  document.getElementById("imageLightbox").classList.remove("hidden");
  document.getElementById("lightboxImg").src = src;
}

function closeImage() {
  document.getElementById("imageLightbox").classList.add("hidden");
}

// init
render(projects);

</script>

</body>
</html>
